<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - Simple Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #059669; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #059669;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #047857;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #d1fae5;
            border-radius: 5px;
            border-left: 5px solid #059669;
        }
        .link-box {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            word-break: break-all;
            font-family: monospace;
            border: 2px solid #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛳ Create Golf Event - Simple Version</h1>
        
        <div class="form-group">
            <label>Event Name *</label>
            <input type="text" id="event-name" placeholder="e.g., Monthly Challenge" value="Test Event">
        </div>
        
        <div class="form-group">
            <label>Event Date *</label>
            <input type="date" id="event-date" value="2026-06-05">
        </div>
        
        <div class="form-group">
            <label>Course Name *</label>
            <input type="text" id="course-name" placeholder="e.g., Muthaiga Golf Club" value="Test Course">
        </div>
        
        <button onclick="createEvent()">🚀 CREATE EVENT</button>
        
        <div id="result" class="result" style="display: none;">
            <h2 style="color: #059669; margin-bottom: 15px;">✅ Event Created!</h2>
            
            <h3 style="margin-top: 20px;">📱 Registration Link (Share with Members):</h3>
            <div class="link-box" id="reg-link"></div>
            <button onclick="copyText('reg-link')">📋 Copy Registration Link</button>
            
            <h3 style="margin-top: 20px;">🔧 Admin Link (For Score Entry):</h3>
            <div class="link-box" id="admin-link"></div>
            <button onclick="copyText('admin-link')">📋 Copy Admin Link</button>
            
            <div style="margin-top: 20px; padding: 15px; background: #fef3c7; border-radius: 5px;">
                <p><strong>✅ Success!</strong> Your event has been created.</p>
                <p style="margin-top: 10px;">Copy the registration link above and share it via WhatsApp, Email, or SMS.</p>
            </div>
        </div>
    </div>

    <script>
        function createEvent() {
            const eventName = document.getElementById('event-name').value;
            const eventDate = document.getElementById('event-date').value;
            const courseName = document.getElementById('course-name').value;
            
            if (!eventName || !eventDate || !courseName) {
                alert('⚠️ Please fill in all required fields!');
                return;
            }
            
            // Create event ID
            const eventId = 'event_' + Date.now();
            
            // Save to localStorage
            const event = {
                id: eventId,
                name: eventName,
                date: eventDate,
                course: courseName,
                created: new Date().toISOString(),
                registrations: []
            };
            
            let events = JSON.parse(localStorage.getItem('golfEvents') || '[]');
            events.push(event);
            localStorage.setItem('golfEvents', JSON.stringify(events));
            
            // Generate links
            const currentPath = window.location.href;
            const basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
            
            const regLink = basePath + 'event-registration.html?event=' + eventId;
            const adminLink = basePath + 'golf-ambassadors.html?event=' + eventId;
            
            // Display links
            document.getElementById('reg-link').textContent = regLink;
            document.getElementById('admin-link').textContent = adminLink;
            document.getElementById('result').style.display = 'block';
            
            // Scroll to result
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            
            alert('✅ Event Created!\n\nEvent: ' + eventName + '\nDate: ' + eventDate + '\n\nScroll down to see the links!');
        }
        
        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Link copied to clipboard!\n\nYou can now paste it in WhatsApp, Email, or SMS.');
            }).catch(() => {
                alert('❌ Could not copy automatically.\n\nPlease select the text and copy manually (Ctrl+C or Cmd+C).');
            });
        }
    </script>
</body>
</html>
