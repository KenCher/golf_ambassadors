<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Golf4us GPS - On Course</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 1.5em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gps-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            margin-top: 8px;
            color: #4ade80;
        }

        .gps-status.inactive {
            color: #f87171;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            padding: 20px;
        }

        .distance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .distance-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .distance-value {
            font-size: 4em;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }

        .distance-unit {
            font-size: 1.2em;
            opacity: 0.8;
        }

        .direction-indicator {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1em;
        }

        .compass-arrow {
            font-size: 2em;
            transition: transform 0.3s ease;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-card-label {
            font-size: 0.85em;
            opacity: 0.8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-card-value {
            font-size: 1.8em;
            font-weight: 700;
        }

        .hole-info {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hole-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .hole-number {
            font-size: 2em;
            font-weight: 800;
        }

        .hole-par {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        .hole-details {
            display: flex;
            gap: 20px;
            font-size: 0.95em;
        }

        .hole-detail {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hole-detail-label {
            opacity: 0.7;
            font-size: 0.85em;
        }

        .hole-detail-value {
            font-weight: 600;
            font-size: 1.1em;
        }

        .hazards-section {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .hazards-title {
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hazard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hazard-item:last-child {
            border-bottom: none;
        }

        .action-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .accuracy-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            margin-top: 10px;
            justify-content: center;
        }

        .accuracy-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .accuracy-good { background: #4ade80; }
        .accuracy-fair { background: #fbbf24; }
        .accuracy-poor { background: #f87171; }

        .elevation-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .elevation-arrow {
            font-size: 1.5em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .modal-title {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .modal-message {
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .shot-tracker {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .shot-tracker-title {
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .shot-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .shot-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .shot-number {
            font-weight: 700;
            font-size: 1.2em;
        }

        .shot-distance {
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⛳ Golf4us GPS</h1>
        <div class="gps-status" id="gpsStatus">
            <span class="status-dot"></span>
            <span id="statusText">Initializing GPS...</span>
        </div>
    </div>

    <div class="main-content">
        <!-- Distance to Green Card -->
        <div class="distance-card">
            <div class="distance-label">Distance to Green</div>
            <div class="distance-value" id="distanceValue">---</div>
            <div class="distance-unit">yards</div>
            <div class="direction-indicator">
                <span class="compass-arrow" id="compassArrow">↑</span>
                <span id="compassDirection">N</span>
            </div>
            <div class="accuracy-indicator">
                <span class="accuracy-dot" id="accuracyDot"></span>
                <span id="accuracyText">Acquiring signal...</span>
            </div>
        </div>

        <!-- Hole Information -->
        <div class="hole-info">
            <div class="hole-header">
                <div class="hole-number">Hole <span id="holeNumber">1</span></div>
                <div class="hole-par">Par <span id="holePar">4</span></div>
            </div>
            <div class="hole-details">
                <div class="hole-detail">
                    <span class="hole-detail-label">Yardage</span>
                    <span class="hole-detail-value" id="holeYardage">380</span>
                </div>
                <div class="hole-detail">
                    <span class="hole-detail-label">Handicap</span>
                    <span class="hole-detail-value" id="holeHandicap">11</span>
                </div>
            </div>
            <div class="elevation-info" id="elevationInfo" style="display: none;">
                <span class="elevation-arrow" id="elevationArrow">↗</span>
                <span id="elevationText">+15 ft elevation</span>
            </div>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
            <div class="info-card">
                <div class="info-card-label">To Fairway</div>
                <div class="info-card-value" id="fairwayDistance">---</div>
            </div>
            <div class="info-card">
                <div class="info-card-label">Accuracy</div>
                <div class="info-card-value" id="gpsAccuracy">---</div>
            </div>
        </div>

        <!-- Hazards Section -->
        <div class="hazards-section" id="hazardsSection" style="display: none;">
            <div class="hazards-title">⚠️ Nearby Hazards</div>
            <div id="hazardsList"></div>
        </div>

        <!-- Shot Tracker -->
        <div class="shot-tracker">
            <div class="shot-tracker-title">📍 Shot Tracker</div>
            <div class="shot-list" id="shotList">
                <p style="opacity: 0.7; text-align: center;">No shots recorded yet</p>
            </div>
        </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <button class="btn btn-secondary" id="recordShotBtn">
            📍 Mark Shot
        </button>
        <button class="btn btn-primary" id="nextHoleBtn">
            Next Hole →
        </button>
    </div>

    <!-- GPS Permission Modal -->
    <div class="modal" id="gpsModal">
        <div class="modal-content">
            <div class="modal-title">Enable GPS</div>
            <div class="modal-message">
                <div class="loading"></div>
                <p style="margin-top: 20px;">Requesting location access...</p>
            </div>
        </div>
    </div>

    <script type="module">
        // Import GPS utilities (in production, this would be from the actual module)
        class GPSManager {
            constructor() {
                this.currentPosition = null;
                this.watchId = null;
                this.isTracking = false;
                this.shots = [];
                this.currentHole = 1;
                
                // Sample hole data (would come from server in production)
                this.holes = this.generateSampleHoles();
            }

            generateSampleHoles() {
                const holes = [];
                for (let i = 1; i <= 18; i++) {
                    holes.push({
                        number: i,
                        par: i % 3 === 0 ? 3 : i % 5 === 0 ? 5 : 4,
                        yardage: 300 + Math.floor(Math.random() * 200),
                        handicap: i,
                        green: {
                            lat: 37.7749 + (Math.random() * 0.01),
                            lon: -122.4194 + (Math.random() * 0.01),
                            elevation: Math.floor(Math.random() * 50)
                        },
                        fairway: {
                            lat: 37.7749 + (Math.random() * 0.005),
                            lon: -122.4194 + (Math.random() * 0.005)
                        },
                        hazards: []
                    });
                }
                return holes;
            }

            async requestPermission() {
                if (!('geolocation' in navigator)) {
                    throw new Error('GPS not available');
                }

                return new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            this.currentPosition = position;
                            resolve(position);
                        },
                        (error) => reject(error),
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                });
            }

            startTracking(callback) {
                this.isTracking = true;
                this.watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        this.currentPosition = position;
                        if (callback) callback(position);
                    },
                    (error) => console.error('GPS error:', error),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }

            stopTracking() {
                if (this.watchId) {
                    navigator.geolocation.clearWatch(this.watchId);
                    this.isTracking = false;
                }
            }

            calculateDistance(lat1, lon1, lat2, lon2) {
                const R = 6371000;
                const φ1 = lat1 * Math.PI / 180;
                const φ2 = lat2 * Math.PI / 180;
                const Δφ = (lat2 - lat1) * Math.PI / 180;
                const Δλ = (lon2 - lon1) * Math.PI / 180;

                const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                          Math.cos(φ1) * Math.cos(φ2) *
                          Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

                return Math.round(R * c * 1.09361); // Convert to yards
            }

            calculateBearing(lat1, lon1, lat2, lon2) {
                const φ1 = lat1 * Math.PI / 180;
                const φ2 = lat2 * Math.PI / 180;
                const Δλ = (lon2 - lon1) * Math.PI / 180;

                const y = Math.sin(Δλ) * Math.cos(φ2);
                const x = Math.cos(φ1) * Math.sin(φ2) -
                          Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
                const θ = Math.atan2(y, x);
                return (θ * 180 / Math.PI + 360) % 360;
            }

            getCompassDirection(bearing) {
                const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                const index = Math.round(bearing / 45) % 8;
                return directions[index];
            }

            recordShot() {
                if (this.currentPosition) {
                    const shot = {
                        hole: this.currentHole,
                        lat: this.currentPosition.coords.latitude,
                        lon: this.currentPosition.coords.longitude,
                        timestamp: Date.now()
                    };
                    
                    if (this.shots.length > 0) {
                        const lastShot = this.shots[this.shots.length - 1];
                        shot.distance = this.calculateDistance(
                            lastShot.lat, lastShot.lon,
                            shot.lat, shot.lon
                        );
                    }
                    
                    this.shots.push(shot);
                    return shot;
                }
                return null;
            }

            getCurrentHole() {
                return this.holes[this.currentHole - 1];
            }

            nextHole() {
                if (this.currentHole < 18) {
                    this.currentHole++;
                    this.shots = [];
                    return true;
                }
                return false;
            }
        }

        // Initialize GPS Manager
        const gpsManager = new GPSManager();
        let updateInterval = null;

        // UI Elements
        const elements = {
            gpsStatus: document.getElementById('gpsStatus'),
            statusText: document.getElementById('statusText'),
            distanceValue: document.getElementById('distanceValue'),
            compassArrow: document.getElementById('compassArrow'),
            compassDirection: document.getElementById('compassDirection'),
            accuracyDot: document.getElementById('accuracyDot'),
            accuracyText: document.getElementById('accuracyText'),
            holeNumber: document.getElementById('holeNumber'),
            holePar: document.getElementById('holePar'),
            holeYardage: document.getElementById('holeYardage'),
            holeHandicap: document.getElementById('holeHandicap'),
            fairwayDistance: document.getElementById('fairwayDistance'),
            gpsAccuracy: document.getElementById('gpsAccuracy'),
            shotList: document.getElementById('shotList'),
            gpsModal: document.getElementById('gpsModal'),
            recordShotBtn: document.getElementById('recordShotBtn'),
            nextHoleBtn: document.getElementById('nextHoleBtn')
        };

        // Initialize GPS
        async function initGPS() {
            elements.gpsModal.classList.add('active');
            
            try {
                await gpsManager.requestPermission();
                elements.gpsModal.classList.remove('active');
                
                elements.gpsStatus.classList.remove('inactive');
                elements.statusText.textContent = 'GPS Active';
                
                gpsManager.startTracking(updateUI);
                updateInterval = setInterval(updateUI, 1000);
                updateHoleInfo();
                
            } catch (error) {
                elements.gpsModal.classList.remove('active');
                elements.gpsStatus.classList.add('inactive');
                elements.statusText.textContent = 'GPS Unavailable';
                alert('GPS permission denied or unavailable. Please enable location services.');
            }
        }

        function updateUI() {
            if (!gpsManager.currentPosition) return;

            const hole = gpsManager.getCurrentHole();
            const coords = gpsManager.currentPosition.coords;

            // Update distance to green
            const distanceToGreen = gpsManager.calculateDistance(
                coords.latitude, coords.longitude,
                hole.green.lat, hole.green.lon
            );
            elements.distanceValue.textContent = distanceToGreen;

            // Update bearing and direction
            const bearing = gpsManager.calculateBearing(
                coords.latitude, coords.longitude,
                hole.green.lat, hole.green.lon
            );
            const direction = gpsManager.getCompassDirection(bearing);
            elements.compassArrow.style.transform = `rotate(${bearing}deg)`;
            elements.compassDirection.textContent = direction;

            // Update distance to fairway
            if (hole.fairway) {
                const distanceToFairway = gpsManager.calculateDistance(
                    coords.latitude, coords.longitude,
                    hole.fairway.lat, hole.fairway.lon
                );
                elements.fairwayDistance.textContent = distanceToFairway + ' yd';
            }

            // Update accuracy
            const accuracy = Math.round(coords.accuracy);
            elements.gpsAccuracy.textContent = accuracy + ' m';
            
            if (accuracy < 10) {
                elements.accuracyDot.className = 'accuracy-dot accuracy-good';
                elements.accuracyText.textContent = 'Excellent accuracy';
            } else if (accuracy < 20) {
                elements.accuracyDot.className = 'accuracy-dot accuracy-fair';
                elements.accuracyText.textContent = 'Good accuracy';
            } else {
                elements.accuracyDot.className = 'accuracy-dot accuracy-poor';
                elements.accuracyText.textContent = 'Fair accuracy';
            }
        }

        function updateHoleInfo() {
            const hole = gpsManager.getCurrentHole();
            elements.holeNumber.textContent = hole.number;
            elements.holePar.textContent = hole.par;
            elements.holeYardage.textContent = hole.yardage;
            elements.holeHandicap.textContent = hole.handicap;
        }

        function updateShotList() {
            const holeShots = gpsManager.shots.filter(s => s.hole === gpsManager.currentHole);
            
            if (holeShots.length === 0) {
                elements.shotList.innerHTML = '<p style="opacity: 0.7; text-align: center;">No shots recorded yet</p>';
                return;
            }

            elements.shotList.innerHTML = holeShots.map((shot, index) => `
                <div class="shot-item">
                    <span class="shot-number">Shot ${index + 1}</span>
                    <span class="shot-distance">${shot.distance || '---'} yards</span>
                </div>
            `).join('');
        }

        // Event Listeners
        elements.recordShotBtn.addEventListener('click', () => {
            const shot = gpsManager.recordShot();
            if (shot) {
                updateShotList();
                // Haptic feedback if available
                if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            }
        });

        elements.nextHoleBtn.addEventListener('click', () => {
            if (gpsManager.nextHole()) {
                updateHoleInfo();
                updateShotList();
                updateUI();
            } else {
                alert('Round complete!');
            }
        });

        // Start GPS on load
        initGPS();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            gpsManager.stopTracking();
            if (updateInterval) clearInterval(updateInterval);
        });
    </script>
</body>
</html>
